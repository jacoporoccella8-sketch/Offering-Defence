name: Defence Market Daily Scraper

on:
  schedule:
    - cron: "30 7 * * *"
  workflow_dispatch:

jobs:
  scraper:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scraper
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
        run: python defence_market_scraper.py --once

      - name: Upload Excel output as artifact
        uses: actions/upload-artifact@v4
        with:
          name: defence-market-report-${{ github.run_id }}
          path: output/*.xlsx
          retention-days: 30

      - name: Commit history update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/history.json || true
          git diff --staged --quiet || git commit -m "chore: aggiorna history scraper [skip ci]"
          git push || true
